<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>404 · Plinth</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;0,700;1,300;1,400;1,500&family=Jost:wght@200;300;400;500&display=swap" rel="stylesheet">
<style>
:root{--green:#1b4436;--green-deep:#122e24;--gold:#D99E32;--beige:#F5EDE4;}
*{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;}
body{font-family:'Jost',sans-serif;font-weight:300;background:var(--green-deep);min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:40px 24px;}
.card{position:relative;z-index:1;max-width:480px;width:100%;text-align:center;animation:fadeUp 0.5s ease both;}
.mark{font-size:10px;font-weight:400;letter-spacing:0.25em;text-transform:uppercase;color:rgba(204,207,142,0.5);margin-bottom:36px;}
.wordmark{font-family:'Cormorant Garamond',serif;font-weight:500;font-size:30px;color:var(--beige);margin-bottom:28px;}
.wordmark span{color:var(--gold);}
.divider{width:28px;height:1px;background:rgba(210,187,159,0.2);margin:0 auto 28px;}
.headline{font-family:'Cormorant Garamond',serif;font-weight:400;font-size:24px;color:rgba(245,237,228,0.8);margin-bottom:10px;line-height:1.2;}
.body{font-size:12px;color:rgba(245,237,228,0.35);line-height:1.8;margin-bottom:36px;}
.btn{display:inline-block;font-family:'Jost',sans-serif;font-weight:400;font-size:11px;letter-spacing:0.12em;text-transform:uppercase;text-decoration:none;padding:12px 32px;border-radius:4px;background:var(--gold);color:var(--green-deep);transition:background 0.2s;}
.btn:hover{background:#e8aa38;}
.footer{position:fixed;bottom:22px;font-size:10px;color:rgba(245,237,228,0.12);letter-spacing:0.1em;text-transform:uppercase;}
@keyframes fadeUp{from{opacity:0;transform:translateY(12px);}to{opacity:1;transform:translateY(0);}}
</style>
</head>
<body>
<div class="card">
  <div class="mark">The Coherence Collective &nbsp;&middot;&nbsp; Plinth</div>
  <div class="wordmark">Pl<span>in</span>th</div>
  <div class="divider"></div>
  <div class="headline">This page doesn&rsquo;t exist.</div>
  <div class="body">The link may be incorrect or the resource has moved.</div>
  <a href="/" class="btn">Return to Plinth</a>
</div>
<div class="footer">Advisor Access Only &nbsp;&middot;&nbsp; The Coherence Collective</div>
</body>
</html>
